name: Deploy Production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to production server via SCP
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "."
          target: ${{ secrets.PROD_DEPLOY_PATH }}
          overwrite: true

      - name: Run remote deploy commands
        uses: appleboy/ssh-action@v0.1.7
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          PROD_FRONTEND_ORIGIN: ${{ secrets.PROD_FRONTEND_ORIGIN }}
          PROD_FE_PORT: ${{ secrets.PROD_FE_PORT }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          envs: PROD_API_BASE_URL,PROD_FRONTEND_ORIGIN,PROD_FE_PORT
          script: |
            set -e

            cd ${{ secrets.PROD_DEPLOY_PATH }}

            if [ ! -f .env.production ]; then
              echo ".env.production not found"
              exit 1
            fi

            chmod 600 .env.production

            if [ -z "${PROD_API_BASE_URL:-}" ]; then
              echo "PROD_API_BASE_URL secret is required for frontend deploy"
              exit 1
            fi

            if [ -z "${PROD_FRONTEND_ORIGIN:-}" ]; then
              echo "PROD_FRONTEND_ORIGIN secret is required for backend CORS"
              exit 1
            fi

            export FRONTEND_ORIGIN="${PROD_FRONTEND_ORIGIN}"

            echo "Deploying backend..."
            cd BE/docker

            docker compose --env-file ../../.env.production pull --ignore-pull-failures || true
            docker compose --env-file ../../.env.production up -d --build

            echo "Deploying frontend..."
            cd ../..

            if [ ! -d fe ]; then
              echo "fe directory not found"
              exit 1
            fi

            export NEXT_PUBLIC_API_BASE_URL="${PROD_API_BASE_URL}"

            cd fe

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build

            FE_PORT="${PROD_FE_PORT:-3000}"

            echo "Stopping existing frontend on port ${FE_PORT}..."
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${FE_PORT}/tcp" || true
            else
              pkill -f "next start" || true
              pkill -f "npm start" || true
            fi

            sleep 2

            echo "Starting frontend on port ${FE_PORT}..."
            nohup env PORT="${FE_PORT}" NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" npm start > fe.log 2>&1 &

            sleep 2
            tail -n 50 fe.log || true